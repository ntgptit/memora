spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: ${MEMORA_DB_URL:jdbc:postgresql://localhost:5432/memora}
    username: ${MEMORA_DB_USERNAME:giapnt}
    password: ${MEMORA_DB_PASSWORD:abcd1234}
  docker:
    compose:
      enabled: ${MEMORA_DOCKER_COMPOSE_ENABLED:false}

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

app:
  cors:
    allowed-origin-patterns:
      - http://localhost:*
      - http://127.0.0.1:*
  security:
    public-paths:
      - /api/v1/auth/login
      - /api/v1/auth/register
      - /api/v1/auth/refresh
      - /api/v1/auth/logout
      - /api/v1/auth/forgot-password
      - /actuator/health
      - /actuator/info
      - /v3/api-docs/**
      - /swagger-ui/**
      - /swagger-ui.html
