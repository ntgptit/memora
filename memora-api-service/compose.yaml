services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      - 'POSTGRES_DB=memora'
      - 'POSTGRES_PASSWORD=memora_dev'
      - 'POSTGRES_USER=memora'
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U memora -d memora']
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - 'postgres-data:/var/lib/postgresql/data'

volumes:
  postgres-data:
